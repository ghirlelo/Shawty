<!DOCTYPE html>
<html>
<head>
<title>AI Quran Search</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;padding:30px;}
input{padding:12px;width:300px;font-size:16px;}
button{padding:12px 15px;font-size:16px;cursor:pointer;margin-left:5px;}
#results{margin-top:30px;max-width:900px;margin:auto;text-align:left;}
.card{padding:15px;border-bottom:1px solid #333;}
.arabic{font-size:28px;direction:rtl;margin-bottom:10px;}
.urdu{font-size:18px;direction:rtl;color:#93c5fd;margin-bottom:10px;}
.ai{color:#a7f3d0;margin-top:10px;}
</style>
</head>
<body>

<h1>AI Quran Topic Search</h1>
<input id="topic" placeholder="Ask about zakat, roza, charity, prayer">
<button onclick="searchTopic()">Search</button>
<div id="results"></div>

<script>
function escapeQuotes(str){ return str.replace(/'/g,"\\'"); }

// ⚠️ Replace this with your OpenAI API key (starts with sk-)
const OPENAI_API_KEY = "sk-YOUR_OPENAI_KEY_HERE";

async function searchTopic(){
  let topic = document.getElementById("topic").value.trim();
  if(!topic) return alert("Please enter a topic.");
  let container = document.getElementById("results");
  container.innerHTML = "Searching Quran...";

  let url = `https://api.alquran.cloud/v1/search/${encodeURIComponent(topic)}/all/en`;

  try{
    let res = await fetch(url);
    let data = await res.json();
    container.innerHTML = "";

    if(!data.data.matches.length){
      container.innerHTML = "<p>No results found for this topic.</p>";
      return;
    }

    data.data.matches.slice(0,5).forEach((ayah,index)=>{
      let card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="arabic">${ayah.text}</div>
        <div class="urdu">${ayah.translation || ''}</div>
        <button onclick="explainAyah('${escapeQuotes(ayah.text)}', ${index})">Explain</button>
        <div class="ai" id="ai${index}"></div>
      `;
      container.appendChild(card);
    });

  } catch(e){
    container.innerHTML = "<p>Error fetching Quran data.</p>";
    console.error(e);
  }
}

async function explainAyah(ayah,index){
  const aiDiv = document.getElementById("ai"+index);
  aiDiv.innerHTML = "AI explaining...";

  try{
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization": `Bearer ${OPENAI_API_KEY}`
      },
      body: JSON.stringify({
        model:"gpt-4o-mini",
        messages:[{role:"user", content:`Explain this Quran verse simply in Urdu: ${ayah}`}]
      })
    });

    const data = await response.json();
    aiDiv.innerHTML = data.choices[0].message.content;

  } catch(e){
    aiDiv.innerHTML = "Failed to get explanation.";
    console.error(e);
  }
}
</script>

</body>
</html>
